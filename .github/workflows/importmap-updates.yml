name: Importmap updates
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: thoughtbot/importmap-update@d8420a0525e5a70663e373b90b1aeb2cf053c830
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          rails-root: ${{ github.workspace }}
