name: Importmap updates
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: thoughtbot/importmap-update@796ad25ea59dd371bf13968da98449326f8ac6d0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          rails-root: ${{ github.workspace }}
