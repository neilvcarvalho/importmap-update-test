name: Importmap updates
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: thoughtbot/importmap-update@80fd88b04e2675e1e7e7e03fefc262bbb8d060e9
        with:
          github-token: ${{ secrets.IMPORTMAP_UPDATE_GH_TOKEN }}
