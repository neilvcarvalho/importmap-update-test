name: Importmap updates
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: thoughtbot/importmap-update@834a902a69edbd584c9d9d6364482e6b16bbabe4
        with:
          github-token: ${{ secrets.IMPORTMAP_UPDATE_GH_TOKEN }}
