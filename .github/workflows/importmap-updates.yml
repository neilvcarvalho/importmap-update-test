name: Importmap updates
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - uses: thoughtbot/importmap-update@64e151070c0654d69e4f0a1b6494e33d58858552
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          rails-root: ${{ github.workspace }}
